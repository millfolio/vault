name: server

# Compiles the Mojo app server (vault/app/server) against the in-repo vault
# packages + flare/json/jinja2 checked out as siblings. Path-filtered to the
# server AND the vault packages it compiles against (one repo now — no more
# cross-repo sibling races).
on:
  push:
    branches: [main]
    paths: ["app/server/**", "core/**", "privacy-box/**", ".github/workflows/app-server.yml"]
  pull_request:
    paths: ["app/server/**", "core/**", "privacy-box/**", ".github/workflows/app-server.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # Apple Silicon — matches the osx-arm64 toolchain pin
    steps:
      # Monorepo layout: this checkout carries BOTH the vault packages and
      # app/ (vault/app/server → core at ../../, libs at ../../../<repo>).
      - uses: actions/checkout@v4
        with:
          path: vault
      - uses: actions/checkout@v4
        with:
          repository: millfolio/flare
          path: flare
      - uses: actions/checkout@v4
        with:
          repository: millfolio/json
          path: json
      - uses: actions/checkout@v4
        with:
          repository: millfolio/jinja2.mojo
          path: jinja2.mojo
      - uses: actions/checkout@v4
        with:
          repository: millfolio/logging.mojo
          path: logging.mojo

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: vault/app/server/pixi.toml

      - name: Test protocol wire helpers
        working-directory: vault/app/server
        run: pixi run test

      - name: Test run-queue state file
        working-directory: vault/app/server
        run: pixi run test-runqueue

      - name: Build millfolio-server
        working-directory: vault/app/server
        run: pixi run build
