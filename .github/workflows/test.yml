name: test

# Pure-Mojo unit-test suite (`pixi run test` — the same target a developer runs
# locally). The derive tests (store / missing-defaults) import the ML classify
# path, which pulls in `flare` (HTTP) + the other vendored Mojo libs, so this job
# checks out vault under `vault/` alongside its siblings — mirroring the `../<lib>`
# `-I` layout the pixi tasks use. (It used to be sibling-free; store.mojo now
# imports `vault.derive.classify`, so the libs are required to compile the tests.)
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-14
    env:
      # One workspace-level Mojo compile cache, restored across runs (see the
      # matching cache step below; same scheme as bundle.yml).
      MODULAR_CACHE_DIR: ${{ github.workspace }}/.mojo-ci-cache
    steps:
      - uses: actions/checkout@v6
        with: { path: vault }
      - uses: actions/checkout@v6
        with: { repository: millfolio/flare, path: flare }
      - uses: actions/checkout@v6
        with: { repository: millfolio/json, path: json }
      - uses: actions/checkout@v6
        with: { repository: millfolio/lancedb.mojo, path: lancedb.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/pdftotext.mojo, path: pdftotext.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/zlib.mojo, path: zlib.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/csv.mojo, path: csv.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/docx.mojo, path: docx.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/jinja2.mojo, path: jinja2.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/logging.mojo, path: logging.mojo }
      # Same two caches as bundle.yml: the conda package downloads (the Mojo
      # toolchain) and the Mojo compile cache — together they turn the cold
      # toolchain-fetch + full recompile into a mostly-warm run.
      - name: Cache pixi/conda packages (Mojo toolchain + deps)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/rattler
          key: rattler-${{ runner.os }}-${{ hashFiles('**/pixi.lock') }}
          restore-keys: rattler-${{ runner.os }}-
      - name: Cache the Mojo compile cache
        uses: actions/cache@v4
        with:
          path: .mojo-ci-cache
          key: mojo-cache-${{ runner.os }}-${{ hashFiles('vault/pixi.lock') }}-${{ github.sha }}
          restore-keys: mojo-cache-${{ runner.os }}-${{ hashFiles('vault/pixi.lock') }}-
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          manifest-path: vault/pixi.toml
      - name: Run the pure-Mojo test suite
        working-directory: vault
        run: pixi run test
