name: app zip

# Builds + packages millfolio-app.zip (ws_server source + the built web UI) the CLI
# downloads and builds/serves on-device. Compiles millfolio-server + millfolio-ws as a
# gate, builds the web app, then packages. Attaches to a Release on tags. Modeled
# on vault's vault-zip.yml.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths: ["app/**", "core/**", "enclave/**", ".github/workflows/app-zip.yml"]
  pull_request:
    paths: ["app/**", "core/**", "enclave/**", ".github/workflows/app-zip.yml"]
  workflow_dispatch:

permissions:
  contents: write # to attach the zip to a Release on tags

jobs:
  zip:
    runs-on: macos-14
    steps:
      # Monorepo layout: this checkout carries the vault packages AND app/;
      # the Mojo libs stay siblings at the workspace root.
      - uses: actions/checkout@v4
        with:
          path: vault
      - uses: actions/checkout@v4
        with:
          repository: millfolio/flare
          path: flare
      - uses: actions/checkout@v4
        with:
          repository: millfolio/json
          path: json
      - uses: actions/checkout@v4
        with:
          repository: millfolio/jinja2.mojo
          path: jinja2.mojo
      - uses: actions/checkout@v4
        with:
          repository: millfolio/logging.mojo
          path: logging.mojo
      # The app-server now COMPILES in the packager (millfolio-server), which
      # precompiles the vault package set — that pulls in vault's deps. Check them
      # out too (mirrors bundle.yml), else precompile_pkgs.sh fails on a missing
      # sibling (e.g. `cp … zlib.mojo/src/zlib.mojo: No such file or directory`).
      - uses: actions/checkout@v4
        with:
          repository: millfolio/zlib.mojo
          path: zlib.mojo
      - uses: actions/checkout@v4
        with:
          repository: millfolio/lancedb.mojo
          path: lancedb.mojo
      - uses: actions/checkout@v4
        with:
          repository: millfolio/pdftotext.mojo
          path: pdftotext.mojo
      - uses: actions/checkout@v4
        with:
          repository: millfolio/csv.mojo
          path: csv.mojo
      - uses: actions/checkout@v4
        with:
          repository: millfolio/docx.mojo
          path: docx.mojo

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: vault/app/server/pixi.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test protocol wire helpers
        working-directory: vault/app/server
        run: pixi run test

      - name: Build millfolio-server (compile gate)
        working-directory: vault/app/server
        run: pixi run build

      - name: Build web UI
        working-directory: vault/app/web
        run: |
          npm install -g npm@11   # node 22 ships npm ~10.9, which rejects the npm-11 lock
          npm ci
          npm run build

      - name: Package millfolio-app.zip
        working-directory: vault/app
        # Run under pixi so `mojo` is on PATH — package-app.sh now compiles the
        # server + precompiles the vault pkgs (precompile_pkgs.sh calls $MOJO).
        run: pixi run --manifest-path server/pixi.toml bash scripts/package-app.sh "$GITHUB_WORKSPACE/millfolio-app.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: millfolio-app-zip
          path: millfolio-app.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: millfolio-app.zip
