name: bundle

# Builds millfolio.zip — the single source bundle the `mill` installer downloads
# (runner/ + privacy_box/ + millfolio/ + app/). See scripts/package_bundle.sh.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths: ["scripts/package_bundle.sh", ".github/workflows/bundle.yml"]
  workflow_dispatch:

permissions:
  contents: write # to attach the zip to a Release on tags

jobs:
  bundle:
    runs-on: macos-14
    steps:
      # Lay the repos out as siblings under the workspace, matching what the
      # component packagers + package_bundle.sh expect (engine/, app/, the libs).
      - uses: actions/checkout@v6
        with: { path: vault }
      - uses: actions/checkout@v6
        with: { repository: millfolio/engine, path: engine }
      - uses: actions/checkout@v6
        with: { repository: millfolio/app, path: app }
      - uses: actions/checkout@v6
        with: { repository: millfolio/flare, path: flare }
      - uses: actions/checkout@v6
        with: { repository: millfolio/json, path: json }
      - uses: actions/checkout@v6
        with: { repository: millfolio/jinja2.mojo, path: jinja2.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/lancedb.mojo, path: lancedb.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/pdftotext.mojo, path: pdftotext.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/zlib.mojo, path: zlib.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/csv.mojo, path: csv.mojo }
      - uses: actions/checkout@v6
        with: { repository: millfolio/docx.mojo, path: docx.mojo }

      # ── caches: skip re-downloading the Mojo toolchain + recompiling the Rust shim ──
      - name: Cache pixi/conda packages (Mojo toolchain + deps)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/rattler
          key: rattler-${{ runner.os }}-${{ hashFiles('**/pixi.lock') }}
          restore-keys: rattler-${{ runner.os }}-
      - name: Cache cargo (lancedb Rust FFI shim — the ~7min lance-encoding build)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            lancedb.mojo/ffi/target
          key: cargo-${{ runner.os }}-${{ hashFiles('lancedb.mojo/ffi/Cargo.lock', 'lancedb.mojo/ffi/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-
      - name: Cache npm (app web UI)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('app/web/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: vault/pixi.toml
          # conda packages are cached above via ~/Library/Caches/rattler (covers all
          # pixi envs, not just vault's); setup-pixi's own cache is redundant + its
          # key-gen fails in this multi-repo layout.
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      # protoc: lancedb.mojo's Rust FFI shim (lance-encoding) needs the protobuf
      # compiler at build time.
      - name: Install protobuf (protoc)
        run: brew install protobuf

      - name: Package millfolio.zip
        working-directory: vault
        run: bash scripts/package_bundle.sh "$GITHUB_WORKSPACE/millfolio.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: millfolio-zip
          path: millfolio.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: millfolio.zip
