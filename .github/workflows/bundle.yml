name: bundle

# Builds millfolio.zip — the single source bundle the `mill` installer downloads
# (runner/ + enclave/ + millfolio/ + app/). See scripts/package_bundle.sh.
on:
  push:
    branches: [main]
    # Only PRE-RELEASE tags (vX.Y.Z-rc.N, the DEV channel) build + attach assets.
    # Plain vX.Y.Z prod tags are created by `release:promote`, which COPIES the
    # tested rc's assets — they must NOT trigger a rebuild that would clobber them.
    tags: ["v*-*"]
  pull_request:
    paths: ["scripts/package_bundle.sh", "app/**", ".github/workflows/bundle.yml"]
  workflow_dispatch:

permissions:
  contents: write # to attach the zip to a Release on tags

jobs:
  bundle:
    runs-on: macos-14
    env:
      # Relocate the Mojo compile cache (default: inside each project's .pixi env,
      # where a pixi install could clobber it) to ONE workspace path we can cache
      # across runs — every `mojo build` in every project shares + reuses it.
      MODULAR_CACHE_DIR: ${{ github.workspace }}/.mojo-ci-cache
    steps:
      # Lay the repos out as siblings under the workspace, matching what the
      # component packagers + package_bundle.sh expect (engine/, the libs;
      # app/ now lives INSIDE this repo at vault/app).
      - uses: actions/checkout@v6
        with: { path: vault }

      # Reproducible releases: a TAG build pins every sibling to the EXACT commit the
      # release was cut from, recorded in vault/.github/bundle-pins.env by
      # scripts/release.sh (which reads each sibling's current main tip at publish
      # time — so "push to sibling main → cut rc" still gets the latest, just frozen).
      # Each PIN_<REPO> below feeds the matching checkout's `ref:`. When the file is
      # absent (a release cut before pinning landed) OR this isn't a tag build
      # (main push / PR / manual dispatch), no PIN_* is set → `ref:` is empty →
      # actions/checkout uses the default branch = the historical unpinned behavior.
      - name: Pin sibling repos (reproducible release build)
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "not a tag build — siblings unpinned (default-branch tips)."; exit 0
          fi
          if [ ! -f vault/.github/bundle-pins.env ]; then
            echo "::warning::no bundle-pins.env in $GITHUB_REF_NAME — siblings unpinned."; exit 0
          fi
          echo "Pinning siblings from vault/.github/bundle-pins.env:"
          cat vault/.github/bundle-pins.env
          while IFS='=' read -r repo sha; do
            case "$repo" in ''|\#*) continue;; esac
            sha="${sha%%[[:space:]]*}"
            [ -n "$sha" ] || continue
            key="PIN_$(printf '%s' "$repo" | tr 'a-z.-' 'A-Z__')"
            echo "$key=$sha" >> "$GITHUB_ENV"
          done < vault/.github/bundle-pins.env

      - uses: actions/checkout@v6
        with: { repository: millfolio/engine, path: engine, ref: "${{ env.PIN_ENGINE }}" }
      - uses: actions/checkout@v6
        with: { repository: millfolio/flare, path: flare, ref: "${{ env.PIN_FLARE }}" }
      - uses: actions/checkout@v6
        with: { repository: millfolio/json, path: json, ref: "${{ env.PIN_JSON }}" }
      - uses: actions/checkout@v6
        with: { repository: millfolio/jinja2.mojo, path: jinja2.mojo, ref: "${{ env.PIN_JINJA2_MOJO }}" }
      - uses: actions/checkout@v6
        with: { repository: millfolio/lancedb.mojo, path: lancedb.mojo, ref: "${{ env.PIN_LANCEDB_MOJO }}" }
      - uses: actions/checkout@v6
        with: { repository: millfolio/pdftotext.mojo, path: pdftotext.mojo, ref: "${{ env.PIN_PDFTOTEXT_MOJO }}" }
      - uses: actions/checkout@v6
        with: { repository: millfolio/zlib.mojo, path: zlib.mojo, ref: "${{ env.PIN_ZLIB_MOJO }}" }
      - uses: actions/checkout@v6
        with: { repository: millfolio/csv.mojo, path: csv.mojo, ref: "${{ env.PIN_CSV_MOJO }}" }
      - uses: actions/checkout@v6
        with: { repository: millfolio/docx.mojo, path: docx.mojo, ref: "${{ env.PIN_DOCX_MOJO }}" }
      - uses: actions/checkout@v6
        with: { repository: millfolio/logging.mojo, path: logging.mojo, ref: "${{ env.PIN_LOGGING_MOJO }}" }   # enclave: from logging import log

      # ── caches: skip re-downloading the Mojo toolchain + recompiling the Rust shim ──
      - name: Cache pixi/conda packages (Mojo toolchain + deps)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/rattler
          key: rattler-${{ runner.os }}-${{ hashFiles('**/pixi.lock') }}
          restore-keys: rattler-${{ runner.os }}-
      - name: Cache cargo (lancedb Rust FFI shim — the ~7min lance-encoding build)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            lancedb.mojo/ffi/target
          key: cargo-${{ runner.os }}-${{ hashFiles('lancedb.mojo/ffi/Cargo.lock', 'lancedb.mojo/ffi/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-
      - name: Cache npm (app web UI)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('vault/app/web/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      # The Mojo COMPILE cache (see MODULAR_CACHE_DIR above) — the dominant cold
      # cost once the toolchain download is cached. The github.sha key suffix
      # means every run SAVES its incrementally-warmed cache and restores the
      # nearest prior one; keyed on pixi.lock so a nightly bump starts clean
      # (stale-compiler cache entries are useless). The post-job save uploads
      # AFTER the release assets attach, so it never delays a waiting rc publish.
      - name: Cache the Mojo compile cache
        uses: actions/cache@v4
        with:
          path: .mojo-ci-cache
          key: mojo-cache-${{ runner.os }}-${{ hashFiles('vault/pixi.lock') }}-${{ github.sha }}
          restore-keys: mojo-cache-${{ runner.os }}-${{ hashFiles('vault/pixi.lock') }}-

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          manifest-path: vault/pixi.toml
          # conda packages are cached above via ~/Library/Caches/rattler (covers all
          # pixi envs, not just vault's); setup-pixi's own cache is redundant + its
          # key-gen fails in this multi-repo layout.
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      # package_bundle.sh runs `npm ci` for the web UI; the lock is generated with
      # npm 11 and node 22 ships npm ~10.9, which rejects it ("Missing esbuild@…").
      - run: npm install -g npm@11

      # protoc: lancedb.mojo's Rust FFI shim (lance-encoding) needs the protobuf
      # compiler at build time.
      - name: Install protobuf (protoc)
        run: brew install protobuf

      # Every ```mojo example in the codegen system prompt must compile against the
      # vault package (catches a wrong tool/field like the .id/.alias regression).
      # Here, not in the hermetic vault `test` job, because it needs the sibling libs.
      - name: Codegen prompt examples compile
        working-directory: vault
        run: pixi run bash scripts/check_prompt_examples.sh

      - name: Package millfolio.zip
        working-directory: vault
        run: bash scripts/package_bundle.sh "$GITHUB_WORKSPACE/millfolio.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: millfolio-zip
          path: millfolio.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: millfolio.zip
          # A pre-release tag (vX.Y.Z-rc.N) is the DEV channel — keep it OFF
          # /releases/latest so prod CLIs (and the version-pinned bundle URL) ignore
          # it until `release:promote` copies the assets to a clean vX.Y.Z release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
