$schema: 'https://moonrepo.dev/schemas/project.json'
layer: 'application'
tags: ['mojo', 'swift']
# Mojo build-dep siblings (-I ../x). Affected-detection: rebuild vault when a dep's sources change.
dependsOn: ['flare', 'json', 'lancedb', 'pdftotext', 'zlib', 'csv', 'jinja2']

tasks:
  # ── build / check ──────────────────────────────────────────────
  build: # Mojo binaries: build/vault (core) + build/privacy_box
    command: 'pixi run build'
    toolchain: 'system'
    inputs: ['core/**/*.mojo', 'privacy-box/**/*', 'pixi.toml', 'pixi.lock']
    outputs: ['build/**/*']
    # Serialize with lancedb:check — both build the same liblancedbmojo.dylib via
    # lancedb's ffi/build.sh; concurrent builds corrupt it. See lancedb/moon.yml.
    options:
      mutex: 'lancedb-shim'
  test: # unit suite: sha256 + date/amount/transaction extractors + privacy-box sandbox/egress/budget
    command: 'pixi run test'
    toolchain: 'system'
    inputs: ['core/**/*.mojo', 'privacy-box/**/*.mojo', 'pixi.toml', 'pixi.lock']
  precompile: # the precompiled .mojopkg set the install bundle ships — RELEASE-critical
    # `mojo precompile` compiles every file in each package (vault surface + libs),
    # so it catches breakage a binary build skips (a nightly API rename, a
    # `len(String)` only the tool surface reaches). Part of `check` so a precompile
    # break is caught by `moon run :check`, not at release/tag time.
    command: 'pixi run precompile'
    toolchain: 'system'
    inputs: ['core/src/**/*.mojo', 'core/scripts/precompile_pkgs.sh', 'pixi.toml', 'pixi.lock']
    outputs: ['build/pkgs/**/*']
  check: # build BOTH binaries + the precompiled pkg set, then run the unit suite
    command: 'pixi run test'
    deps: ['build', 'precompile', 'eval-selftest']
    toolchain: 'system'

  # ── prompt eval (frontier codegen quality) ─────────────────────
  eval: # per-MODEL codegen PROMPT eval — manual pre-release gate (needs ANTHROPIC_API_KEY)
    #   moon run vault:eval             → default model (claude-sonnet-5)
    #   moon run vault:eval -- <model>  → e.g. claude-sonnet-4-6
    # Model-nondeterministic + key-requiring, so it is NOT in :check. Re-run after
    # any model change or major prompt edit — see CONTRIBUTING.md.
    command: 'bash privacy-box/eval/run_eval.sh'
    deps: ['build']
    toolchain: 'system'
    options:
      cache: false
  eval-selftest: # mock-driven unit tests for the eval HARNESS (no key/model/network) — in :check
    command: 'bash privacy-box/eval/run_eval_test.sh'
    toolchain: 'system'
    inputs:
      ['privacy-box/eval/run_eval.sh', 'privacy-box/eval/run_eval_test.sh', 'privacy-box/eval/golden.*.tsv']
  build-cli: # the Swift `mill` umbrella CLI
    command: 'swift build --package-path cli --product mill'
    toolchain: 'system'
    inputs: ['cli/Sources/**/*.swift', 'cli/Package.swift']

  # ── release artifacts (replaces scripts/package_bundle.sh + update-formula.sh) ──
  bundle: # the single install source bundle the `mill` installer downloads
    command: 'bash scripts/package_bundle.sh millfolio.zip'
    toolchain: 'system'
    inputs: ['scripts/package_bundle.sh', 'core/**/*', 'privacy-box/**/*']
    outputs: ['millfolio.zip']
  formula: # bump the Homebrew formula to a published tag — moon run vault:formula -- v0.4.1
    command: 'bash cli/dist/homebrew/update-formula.sh'
    toolchain: 'system'
