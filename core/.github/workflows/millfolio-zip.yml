name: millfolio zip

# Builds millfolio.zip — the millfolio source bundle the Millfolio app downloads, then
# `mojo build`s on-device. See scripts/package_millfolio.sh. Mirrors privacy_box's
# privacy_box-zip.yml; millfolio now links the full toolbox (flare HTTP, the LanceDB
# Rust shim, pdftotext + zlib), so the siblings are checked out and their FFI
# shims built before the compile-check.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths: ["scripts/package_millfolio.sh", ".github/workflows/millfolio-zip.yml", "pixi.toml"]
  workflow_dispatch:

permissions:
  contents: write # to attach the zip to a Release on tags

jobs:
  zip:
    runs-on: macos-14
    steps:
      # Lay the repos out as siblings, matching the dev layout the package script
      # and the `-I ../flare -I ../json -I ../lancedb.mojo/src -I ../pdftotext.mojo/src
      # -I ../zlib.mojo/src` build assume.
      - uses: actions/checkout@v6
        with:
          path: millfolio
      - uses: actions/checkout@v6
        with:
          repository: millfolio/flare
          path: flare
      - uses: actions/checkout@v6
        with:
          repository: millfolio/json
          path: json
      - uses: actions/checkout@v6
        with:
          repository: millfolio/lancedb.mojo
          path: lancedb.mojo
      - uses: actions/checkout@v6
        with:
          repository: millfolio/pdftotext.mojo
          path: pdftotext.mojo
      - uses: actions/checkout@v6
        with:
          repository: millfolio/zlib.mojo
          path: zlib.mojo
      - uses: actions/checkout@v6
        with:
          repository: millfolio/csv.mojo
          path: csv.mojo
      - uses: actions/checkout@v6
        with:
          repository: millfolio/docx.mojo
          path: docx.mojo

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: millfolio/pixi.toml

      # cargo is preinstalled on macos-14 runners; the LanceDB shim (Rust cdylib)
      # build needs it. Print the version so failures are diagnosable.
      - name: Rust toolchain
        run: cargo --version

      # LanceDB's lance-encoding crate builds protobufs at compile time, so it
      # needs `protoc` on PATH (present on dev machines, not the bare runner).
      - name: Install protobuf (protoc)
        run: brew install protobuf

      # Cache the cargo registry + lancedb.mojo/ffi/target so the LanceDB shim
      # (the slow ~8-min arrow/lance/datafusion build) only relinks on subsequent
      # runs. Keyed on the shim's Cargo.lock by the action.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lancedb.mojo/ffi

      # Builds every FFI shim (zlib + flare http/tls + the LanceDB cdylib — the
      # last pulls lancedb+arrow on first build, so it's slow) then compiles millfolio.
      - name: Build millfolio
        working-directory: mill
        run: pixi run build

      - name: Package millfolio.zip
        working-directory: mill
        run: pixi run bash scripts/package_millfolio.sh "$GITHUB_WORKSPACE/millfolio.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: millfolio-zip
          path: millfolio.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: millfolio.zip
