$schema: 'https://moonrepo.dev/schemas/project.json'
layer: 'tool'
tags: ['release']

# Release orchestration for the superproject (the homebrew-tap is not a submodule,
# so this drives it directly). The per-artifact steps also exist on `vault`
# (vault:bundle, vault:formula); this ties tag → CI → tap into one command.
tasks:
  # moon run release:preflight — build millfolio.zip LOCALLY before tagging, so a
  # packaging/checkout gap fails here instead of in CI after the tag is live (a broken
  # release with no bundle). `publish` runs this first; run it standalone to check.
  preflight:
    command: 'bash release_preflight.sh'
    toolchain: 'system'
    options:
      cache: false # builds artifacts from live source; never cache
      runInCI: false

  # moon run release:publish -- vX.Y.Z-rc.N   — cut a DEV (pre-release) build (mill-dev).
  publish:
    command: 'bash release.sh'
    toolchain: 'system'
    options:
      cache: false # side-effecting (tags, pushes); never cache
      runInCI: false

  # moon run release:promote -- vX.Y.Z   — ship a tested rc to PROD (mill), no rebuild:
  # copies the rc's assets to a clean vX.Y.Z release + bumps the prod formula.
  promote:
    command: 'bash promote.sh'
    toolchain: 'system'
    options:
      cache: false # side-effecting (release, tag, tap push); never cache
      runInCI: false

  # moon run release:verify [-- vX.Y.Z]   (no arg → checks whatever the tap pins)
  # Confirms both release assets are attached AND the tap formula matches.
  verify:
    command: 'bash verify_release.sh'
    toolchain: 'system'
    options:
      cache: false # queries live GitHub state; never cache
      runInCI: false
