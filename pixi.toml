[workspace]
name = "vault"
version = "0.1.0"
description = "millfolio personal data vault — local Q&A over your own documents. One build for the two Mojo binaries (core=vault, sandbox=privacy harness); the Swift cli builds separately."
channels = [
    "https://conda.modular.com/max-nightly",
    "conda-forge",
]
platforms = ["osx-arm64"]

[dependencies]
mojo = "==1.0.0b3.dev2026062706"
# FFI runtime deps shared by both binaries (flare TLS/HTTP, zlib FlateDecode for
# PDFs, brotli for Content-Encoding). The shims are built into $CONDA_PREFIX/lib
# by the `ffi` task below.
openssl          = ">=3.6.1,<4"
ca-certificates  = ">=2025.1.31"
zlib             = ">=1.3.1,<2"
libbrotlicommon  = ">=1,<2"
libbrotlidec     = ">=1,<2"
libbrotlienc     = ">=1,<2"

# Libraries are sibling repos under the millfolio org, consumed via `-I` (no path
# deps): ../flare ../json ../lancedb.mojo ../pdftotext.mojo ../zlib.mojo ../csv.mojo
# ../docx.mojo ../jinja2.mojo. The engine (../engine) is NOT a build dep — it's a runtime
# embedding server, vendored as a binary at install.

[tasks]
# Build every FFI shim both binaries need into this env's $CONDA_PREFIX/lib:
#   libzlibmojo (PDF FlateDecode), libflare_tls/http (HTTP client),
#   liblancedbmojo (the Rust cdylib vector store — slow on first build).
ffi = "bash -c 'bash ../zlib.mojo/src/ffi/build.sh; source ../flare/flare/tls/ffi/build.sh; source ../flare/flare/http/ffi/build.sh; bash ../lancedb.mojo/ffi/build.sh'"

# core = the vault binary (indexer, embeddings, tool surface, ask loop).
vault = { cmd = "mkdir -p build && mojo build core/src/millfolio.mojo -I core/src -I ../flare -I ../json -I ../lancedb.mojo/src -I ../pdftotext.mojo/src -I ../zlib.mojo/src -I ../csv.mojo/src -I ../docx.mojo/src -o build/vault", depends-on = ["ffi"] }

# privacy-box = the privacy harness (frontier/local broker, codegen, egress guard).
privacy-box = { cmd = "mkdir -p build && mojo build privacy-box/src/privacy_box.mojo -I core/src -I ../flare -I ../json -I ../jinja2.mojo/src -I ../logging.mojo/src -o build/privacy_box", depends-on = ["ffi"] }

# the "one mojo" — both Mojo binaries.
build = { depends-on = ["vault", "privacy-box"] }

# precompile = the precompiled .mojoc set the install bundle ships (vault tool
# surface + libs). The RELEASE depends on this (package_millfolio.sh runs the same
# script), and `mojo precompile` compiles EVERY file in each package — not just the
# submodules a binary build happens to import — so it catches breakage (e.g. a
# nightly API rename, or a `len(String)` that only the tool surface reaches) that
# `mojo build` of the binaries silently skips. Wired into `check` so `moon run
# :check` exercises it locally and in CI, before tag time. No FFI shims needed —
# precompile only elaborates Mojo source.
precompile = { cmd = "bash core/scripts/precompile_pkgs.sh build/pkgs" }

# the Swift umbrella CLI (separate toolchain; install/start/stop/index/ask).
cli = "swift build --package-path cli -c release"

# Pre-release PROMPT eval — drives `privacy_box codegen` on a synthetic manifest and
# lints the generated program against shape rules (privacy-box/eval/golden.tsv). NOT
# in `test`/`check`: codegen is model-nondeterministic and needs ANTHROPIC_API_KEY,
# so it's a manual pre-release gate, not a pre-push one. `pixi run eval`.
eval = { cmd = "bash privacy-box/eval/run_eval.sh", depends-on = ["privacy-box"] }

# Gate: pure-Mojo SHA-256 against FIPS known-answer vectors (used for the
# incremental-reindex content hash). No FFI/-I beyond core/src.
test-sha256 = { cmd = "mkdir -p build && mojo build core/test/index/sha256_test.mojo -I core/src -o build/sha256-test && ./build/sha256-test" }
# Gate: UI search distance→cosine mapping + the relevance floor (the fix that stops
# search returning the k nearest chunks for a term absent from the vault). Pure math.
test-relevance = { cmd = "mkdir -p build && mojo build core/test/index/relevance_test.mojo -I core/src -o build/relevance-test && ./build/relevance-test" }
# Gate: the declarative RESULT SPEC serializer (vault.result) — the v:1 wire
# contract the web presenter consumes: text-only parity (no `data`), the typed-
# money invariant ({type,raw,text}, never a bare float), typed count/date, and the
# kpi/table/series blocks + optional hint. Builds like a generated program (the
# vault include set); pure at runtime (no FFI). Guards COMPUTE_VS_RENDER Phase 1.
test-result = { cmd = "mkdir -p build && mojo build core/test/result_test.mojo -I core/src -I ../flare -I ../json -I ../lancedb.mojo/src -I ../pdftotext.mojo/src -I ../zlib.mojo/src -I ../csv.mojo/src -I ../docx.mojo/src -o build/result-test && ./build/result-test" }
# Gate: `_strip_progress` drops the RESULT-SPEC line (and every other sentinel line)
# from the captured answer, leaving only the real reply text. Guards the seam that
# keeps the serialized spec out of the message TEXT (it rides the message.result field).
test-strip = { cmd = "mkdir -p build && mojo build privacy-box/test/strip_test.mojo -I privacy-box/src -I core/src -I ../flare -I ../json -I ../jinja2.mojo/src -I ../logging.mojo/src -o build/strip-test && ./build/strip-test" }
# Gate: the deterministic tag matcher (vault.derive.categorize) — seed taxonomy
# tags phone/travel/restaurant/groceries/health, multi-valued, and a credit-card/
# transfer line with a digit run gets NO tag (guards the on-device classifier's
# phone false-positive class with pure, deterministic rules). No FFI/network.
test-categorize = { cmd = "mkdir -p build && mojo build core/test/derive/categorize_test.mojo -I core/src -o build/categorize-test && ./build/categorize-test" }
# Gate: the ML-materialization completion marker — insertion-generation coverage
# predicates (pending/ready), the qhash question hash, versioned TSV parse/serialize
# (skip-malformed, wrong-header→discard), marker upsert/drop. Pure, no FFI/network.
test-ledger = { cmd = "mkdir -p build && mojo build core/test/derive/ledger_test.mojo -I core/src -o build/ledger-test && ./build/ledger-test" }
test-classify = { cmd = "mkdir -p build && mojo build core/test/derive/classify_test.mojo -I core/src -o build/classify-test && ./build/classify-test" }
# Gate: the REAL materialization path (vault.derive.store.retag) for tag
# references — a keyword member row gains both the member + group tags, and a
# cached ML tag is preserved while a group that @refs it is derived (refs run
# AFTER the ML carry-over). Links flare (store→classify) but never calls it —
# retag is pure.
test-store = { cmd = "mkdir -p build && mojo build core/test/derive/store_test.mojo -I core/src -I ../flare -o build/store-test && ./build/store-test" }
# Gate: the REAL on-disk persist path (write_txn_rows tmp+rename → load_txn_rows).
# A synthetic reconciling statement extracts → is written → reads back with every
# row intact. Guards the prod HOTFIX regression where the atomic rename got a
# non-NUL-terminated C path (unsafe_ptr) → -1 → transactions.tsv never appeared →
# 0 transactions. The in-memory TSV round-trip (test-transactions) misses this
# because it never crosses the file boundary. Pinned MILLFOLIO_DATA_DIR (hermetic).
test-persist = { cmd = "mkdir -p build && rm -rf build/persist-data && MILLFOLIO_DATA_DIR=\"$PWD/build/persist-data\" bash -c 'mojo build core/test/derive/persist_test.mojo -I core/src -I ../flare -o build/persist-test && MILLFOLIO_DATA_DIR=\"$PWD/build/persist-data\" ./build/persist-test'" }
# Gate: the index PROCESSING-VERSION mechanism — a stored marker (config_dir()/
# .index.procversion) that auto-forces a full rebuild when INDEX_PROCESSING_VERSION
# changes even though file bytes did not (a new Txn field / better extractor / new
# chunking). Pins the marker read/compare/write helpers + the index_effective_force
# decision at the unit level (a full e2e build needs a live embed endpoint). Pinned
# MILLFOLIO_DATA_DIR (hermetic). Pulls the sibling libs like test-result (index.mojo
# links lancedb/flare/…).
test-procversion = { cmd = "mkdir -p build && rm -rf build/procversion-data && MILLFOLIO_DATA_DIR=\"$PWD/build/procversion-data\" bash -c 'mojo build core/test/index/procversion_test.mojo -I core/src -I ../flare -I ../json -I ../lancedb.mojo/src -I ../pdftotext.mojo/src -I ../zlib.mojo/src -I ../csv.mojo/src -I ../docx.mojo/src -o build/procversion-test && MILLFOLIO_DATA_DIR=\"$PWD/build/procversion-data\" ./build/procversion-test'" }
# Gate: the VAULT run sandbox grants read to the dir the index was built from
# (and falls back to the served vault dir when unindexed — never "" or "/").
# Regression guard for the vault-dir mismatch fix.
test-sandbox = { cmd = "mkdir -p build && mojo build privacy-box/test/sandbox_test.mojo -I privacy-box/src -I ../logging.mojo/src -o build/sandbox-test && PRIVACY_BOX_HOME=\"$PWD/privacy-box\" ./build/sandbox-test" }
# Gate: M/D statement dates fold with the statement's year into sortable ISO.
test-dates = { cmd = "mkdir -p build && mojo build core/test/extract/dates_test.mojo -I core/src -o build/dates-test && ./build/dates-test" }
# Gate: the relative-date wall-clock API (wall_clock/days_ago/months_ago/years_ago)
# with MILLFOLIO_NOW pinned — calendar rollover, end-of-month + leap clamping, and
# ISO results that sort with `<`. Pure date math (no clock/network in the test).
test-wallclock = { cmd = "mkdir -p build && mojo build core/test/extract/wall_clock_test.mojo -I core/src -o build/wallclock-test && ./build/wallclock-test" }
# Gate: $/comma/paren money strings parse to Float64 (the "total spent" crash).
test-amounts = { cmd = "mkdir -p build && mojo build core/test/extract/amounts_test.mojo -I core/src -o build/amounts-test && ./build/amounts-test" }
# Gate: the invariant-aware transaction extractor reconciles SYNTHETIC statements
# against their own arithmetic (running balance / printed totals), REFUSES a
# corrupted one, and the structured-txn + file_chunks side-table helpers round-trip.
test-transactions = { cmd = "mkdir -p build && mojo build core/test/extract/transactions_test.mojo -I core/src -o build/transactions-test && ./build/transactions-test" }
# Gate: the deterministic (merchant, country, state) descriptor split — trailing
# ISO3 / <city3><ISO3> country, US state, digit-run + residual store-number strip,
# and the location-less fallback (transfers / online). Pure, stdlib-only.
test-location = { cmd = "mkdir -p build && mojo build core/test/extract/location_test.mojo -I core/src -o build/location-test && ./build/location-test" }
# Gate: the EgressGuard blocks real-value fingerprints + canary tokens.
test-egress = { cmd = "mkdir -p build && mojo build privacy-box/test/egress_test.mojo -I privacy-box/src -o build/egress-test && ./build/egress-test" }
# Gate: budget directive parsing/accounting.
test-budget = { cmd = "mkdir -p build && mojo build privacy-box/test/budget_test.mojo -I privacy-box/src -o build/budget-test && ./build/budget-test" }
# Gate: every ```mojo example in the codegen system prompt (privacy_box-system.md)
# COMPILES against the vault package — catches a wrong tool/field (the `.id` vs
# `.alias` regression) before it reaches a release. Needs the SIBLING lib repos on
# the -I path (flare/json/lancedb/…), so it is NOT part of the hermetic `test`
# aggregate (test.yml checks out vault only). It runs where the siblings exist: the
# release preflight (before tagging) + bundle.yml (CI). No FFI/network.
test-prompt-examples = { cmd = "bash scripts/check_prompt_examples.sh" }
# Gate: the `mill` CLI's provisioned mojo nightly matches the pixi pin that
# precompiles vault.mojoc — a drift breaks the vault surface at install time
# (the v0.4.34 .mojoc-version mismatch). pixi.toml is the source of truth.
test-mojo-version = { cmd = "bash scripts/check_mojo_version.sh" }
# The whole pure-Mojo suite — what CI runs (no FFI shims / network needed).
test = { depends-on = ["test-sha256", "test-relevance", "test-categorize", "test-ledger", "test-classify", "test-store", "test-persist", "test-procversion", "test-dates", "test-wallclock", "test-amounts", "test-transactions", "test-location", "test-sandbox", "test-egress", "test-budget", "test-result", "test-strip", "test-mojo-version"] }
