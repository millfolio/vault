[workspace]
name = "vault"
version = "0.1.0"
description = "millfolio personal data vault — local Q&A over your own documents. One build for the two Mojo binaries (core=vault, sandbox=privacy harness); the Swift cli builds separately."
channels = [
    "https://conda.modular.com/max-nightly",
    "conda-forge",
]
platforms = ["osx-arm64"]

[dependencies]
mojo = "==1.0.0b3.dev2026062706"
# FFI runtime deps shared by both binaries (flare TLS/HTTP, zlib FlateDecode for
# PDFs, brotli for Content-Encoding). The shims are built into $CONDA_PREFIX/lib
# by the `ffi` task below.
openssl          = ">=3.6.1,<4"
ca-certificates  = ">=2025.1.31"
zlib             = ">=1.3.1,<2"
libbrotlicommon  = ">=1,<2"
libbrotlidec     = ">=1,<2"
libbrotlienc     = ">=1,<2"

# Libraries are sibling repos under the millfolio org, consumed via `-I` (no path
# deps): ../flare ../json ../lancedb.mojo ../pdftotext.mojo ../zlib.mojo ../csv.mojo
# ../docx.mojo ../jinja2.mojo. The engine (../engine) is NOT a build dep — it's a runtime
# embedding server, vendored as a binary at install.

[tasks]
# Build every FFI shim both binaries need into this env's $CONDA_PREFIX/lib:
#   libzlibmojo (PDF FlateDecode), libflare_tls/http (HTTP client),
#   liblancedbmojo (the Rust cdylib vector store — slow on first build).
ffi = "bash -c 'bash ../zlib.mojo/src/ffi/build.sh; source ../flare/flare/tls/ffi/build.sh; source ../flare/flare/http/ffi/build.sh; bash ../lancedb.mojo/ffi/build.sh'"

# core = the vault binary (indexer, embeddings, tool surface, ask loop).
vault = { cmd = "mkdir -p build && mojo build core/src/millfolio.mojo -I core/src -I ../flare -I ../json -I ../lancedb.mojo/src -I ../pdftotext.mojo/src -I ../zlib.mojo/src -I ../csv.mojo/src -I ../docx.mojo/src -o build/vault", depends-on = ["ffi"] }

# privacy-box = the privacy harness (frontier/local broker, codegen, egress guard).
privacy-box = { cmd = "mkdir -p build && mojo build privacy-box/src/privacy_box.mojo -I ../flare -I ../json -I ../jinja2.mojo/src -I ../logging.mojo/src -o build/privacy_box", depends-on = ["ffi"] }

# the "one mojo" — both Mojo binaries.
build = { depends-on = ["vault", "privacy-box"] }

# precompile = the precompiled .mojopkg set the install bundle ships (vault tool
# surface + libs). The RELEASE depends on this (package_millfolio.sh runs the same
# script), and `mojo precompile` compiles EVERY file in each package — not just the
# submodules a binary build happens to import — so it catches breakage (e.g. a
# nightly API rename, or a `len(String)` that only the tool surface reaches) that
# `mojo build` of the binaries silently skips. Wired into `check` so `moon run
# :check` exercises it locally and in CI, before tag time. No FFI shims needed —
# precompile only elaborates Mojo source.
precompile = { cmd = "bash core/scripts/precompile_pkgs.sh build/pkgs" }

# the Swift umbrella CLI (separate toolchain; install/start/stop/index/ask).
cli = "swift build --package-path cli -c release"

# Gate: pure-Mojo SHA-256 against FIPS known-answer vectors (used for the
# incremental-reindex content hash). No FFI/-I beyond core/src.
test-sha256 = { cmd = "mkdir -p build && mojo build core/test/index/sha256_test.mojo -I core/src -o build/sha256-test && ./build/sha256-test" }
# Gate: the VAULT run sandbox grants read to the dir the index was built from
# (and falls back to the served vault dir when unindexed — never "" or "/").
# Regression guard for the vault-dir mismatch fix.
test-sandbox = { cmd = "mkdir -p build && mojo build privacy-box/test/sandbox_test.mojo -I privacy-box/src -I ../logging.mojo/src -o build/sandbox-test && ./build/sandbox-test" }
# Gate: M/D statement dates fold with the statement's year into sortable ISO.
test-dates = { cmd = "mkdir -p build && mojo build core/test/extract/dates_test.mojo -I core/src -o build/dates-test && ./build/dates-test" }
# Gate: $/comma/paren money strings parse to Float64 (the "total spent" crash).
test-amounts = { cmd = "mkdir -p build && mojo build core/test/extract/amounts_test.mojo -I core/src -o build/amounts-test && ./build/amounts-test" }
# Gate: the invariant-aware transaction extractor reconciles SYNTHETIC statements
# against their own arithmetic (running balance / printed totals), REFUSES a
# corrupted one, and the structured-txn + file_chunks side-table helpers round-trip.
test-transactions = { cmd = "mkdir -p build && mojo build core/test/extract/transactions_test.mojo -I core/src -o build/transactions-test && ./build/transactions-test" }
# Gate: the EgressGuard blocks real-value fingerprints + canary tokens.
test-egress = { cmd = "mkdir -p build && mojo build privacy-box/test/egress_test.mojo -I privacy-box/src -o build/egress-test && ./build/egress-test" }
# Gate: budget directive parsing/accounting.
test-budget = { cmd = "mkdir -p build && mojo build privacy-box/test/budget_test.mojo -I privacy-box/src -o build/budget-test && ./build/budget-test" }
# Gate: the `mill` CLI's provisioned mojo nightly matches the pixi pin that
# precompiles vault.mojopkg — a drift breaks the vault surface at install time
# (the v0.4.34 .mojopkg-version mismatch). pixi.toml is the source of truth.
test-mojo-version = { cmd = "bash scripts/check_mojo_version.sh" }
# The whole pure-Mojo suite — what CI runs (no FFI shims / network needed).
test = { depends-on = ["test-sha256", "test-dates", "test-amounts", "test-transactions", "test-sandbox", "test-egress", "test-budget", "test-mojo-version"] }
