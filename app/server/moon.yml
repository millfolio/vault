$schema: 'https://moonrepo.dev/schemas/project.json'
layer: 'application'
tags: ['mojo']

tasks:
  build:
    command: 'pixi run build'
    toolchain: 'system'
    # The server compiles with `-I ../../vault/core/src -I ../../vault/privacy-box/src`,
    # so it IMPORTS those sibling sources — declare them as inputs (workspace-relative,
    # `/`-prefixed) or moon can't see a vault change and serves a STALE cached binary.
    inputs:
      - 'src/**/*.mojo'
      - '/vault/core/src/**/*.mojo'
      - '/vault/privacy-box/src/**/*.mojo'
      - 'pixi.toml'
      - 'pixi.lock'
  test: # events wire-format + run-queue invariants
    command: 'pixi run test-all'
    toolchain: 'system'
    # The work-queue/log/kv/scheduler tests now build against `vault.storage`
    # (`-I ../../vault/core/src`), so a change there must re-trigger them.
    inputs:
      - 'src/**/*.mojo'
      - 'test/**/*.mojo'
      - '/vault/core/src/**/*.mojo'
      - 'pixi.toml'
      - 'pixi.lock'
  check: # build the server binary (via the build dep), then run the unit suite
    command: 'pixi run test-all'
    deps: ['build']
    toolchain: 'system'
