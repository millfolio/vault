$schema: 'https://moonrepo.dev/schemas/project.json'
layer: 'application'
tags: ['mojo']

tasks:
  build:
    command: 'pixi run build'
    toolchain: 'system'
    inputs: ['src/**/*.mojo', 'pixi.toml', 'pixi.lock']
  test: # events wire-format + run-queue invariants
    command: 'pixi run test-all'
    toolchain: 'system'
    inputs: ['src/**/*.mojo', 'test/**/*.mojo', 'pixi.toml', 'pixi.lock']
  check: # build the server binary (via the build dep), then run the unit suite
    command: 'pixi run test-all'
    deps: ['build']
    toolchain: 'system'
