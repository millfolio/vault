name: app zip

# Builds + packages millfolio-app.zip (ws_server source + the built web UI) the CLI
# downloads and builds/serves on-device. Compiles millfolio-server + millfolio-ws as a
# gate, builds the web app, then packages. Attaches to a Release on tags. Modeled
# on vault's vault-zip.yml.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths: ["server/**", "web/**", "scripts/package-app.sh", ".github/workflows/app-zip.yml"]
  pull_request:
    paths: ["server/**", "web/**", "scripts/package-app.sh", ".github/workflows/app-zip.yml"]
  workflow_dispatch:

permissions:
  contents: write # to attach the zip to a Release on tags

jobs:
  zip:
    runs-on: macos-14
    steps:
      # Sibling layout: app/ alongside vault/ flare/ json/ jinja2.mojo/.
      - uses: actions/checkout@v4
        with:
          path: app
      - uses: actions/checkout@v4
        with:
          repository: millfolio/vault
          path: vault
      - uses: actions/checkout@v4
        with:
          repository: millfolio/flare
          path: flare
      - uses: actions/checkout@v4
        with:
          repository: millfolio/json
          path: json
      - uses: actions/checkout@v4
        with:
          repository: millfolio/jinja2.mojo
          path: jinja2.mojo

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: app/server/pixi.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test protocol wire helpers
        working-directory: app/server
        run: pixi run test

      - name: Build millfolio-server (compile gate)
        working-directory: app/server
        run: pixi run build

      - name: Build web UI
        working-directory: app/web
        run: |
          npm ci
          npm run build

      - name: Package millfolio-app.zip
        working-directory: app
        run: bash scripts/package-app.sh "$GITHUB_WORKSPACE/millfolio-app.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: millfolio-app-zip
          path: millfolio-app.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: millfolio-app.zip
