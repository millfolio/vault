name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# pull-requests/statuses so the bot can comment + set the check; the signature
# commit itself is made with PERSONAL_ACCESS_TOKEN (see repo secret below).
permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/millfolio/.github/blob/main/CLA.md'
          branch: 'main'
          allowlist: winding-lines,dependabot[bot],*[bot]
          # signatures are stored centrally so one signature covers every repo
          remote-organization-name: millfolio
          remote-repository-name: .github
