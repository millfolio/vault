name: web

# Path-filtered: only runs when the web app (or this workflow) changes, so the
# monorepo's other platforms don't trigger a web build.
on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/web.yml"]
  pull_request:
    paths: ["web/**", ".github/workflows/web.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      # Match the npm that generated package-lock.json (npm 11); node 22 ships npm
      # ~10.9, which rejects an npm-11 lock with a spurious "Missing <pkg>" on `npm ci`.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
