# XcodeGen spec — the .xcodeproj is generated, not committed (see .gitignore).
#   brew install xcodegen && xcodegen generate
# then open Millfolio.xcodeproj. CI does the same before xcodebuild.
name: Millfolio
options:
  bundleIdPrefix: com.millfolio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Simulator builds need no signing; device builds set DEVELOPMENT_TEAM locally.
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  Millfolio:
    type: application
    platform: iOS
    sources:
      - path: Millfolio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.millfolio.app
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Millfolio/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        TARGETED_DEVICE_FAMILY: "1,2"
